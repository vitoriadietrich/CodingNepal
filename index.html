<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Neumórfica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator neu-raised">
        <div class="display neu-pressed" id="display"></div>

        <div class="buttons">
            <button class="neu-raised" onclick="append(7)">7</button>
            <button class="neu-raised" onclick="append(8)">8</button>
            <button class="neu-raised" onclick="append(9)">9</button>
            <button class="neu-raised operator" onclick="append('+')">+</button>

            <button class="neu-raised" onclick="append(4)">4</button>
            <button class="neu-raised" onclick="append(5)">5</button>
            <button class="neu-raised" onclick="append(6)">6</button>
            <button class="neu-raised operator" onclick="append('-')">-</button>

            <button class="neu-raised" onclick="append(1)">1</button>
            <button class="neu-raised" onclick="append(2)">2</button>
            <button class="neu-raised" onclick="append(3)">3</button>
            <button class="neu-raised operator" onclick="append('*')">*</button>

            <button class="neu-raised" onclick="append(0)">0</button>
            <button class="neu-raised" onclick="append('.')">.</button>
            <button class="neu-raised operator" onclick="append('/')">/</button>
            <button class="neu-raised equal" onclick="calculate()">=</button>
        </div>
        
        <button class="clear-btn neu-raised" onclick="clearDisplay()">C</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
